name: Multi-OS Build & Release

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: Taikos-Windows.zip
            asset_path: build/bin/*
          - os: ubuntu-latest
            artifact_name: Taikos-Linux.tar.gz
            asset_path: build/bin/*
          - os: macos-latest
            artifact_name: Taikos-MacOS.zip
            asset_path: build/bin/*

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxrandr-dev libudev-dev libgl1-mesa-dev libflac-dev libogg-dev libvorbis-dev libopenal-dev libvorbisenc2 libvorbisfile3

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Pack Artifacts
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        cd build/bin
        if [ "${{ runner.os }}" == "Windows" ]; then
          tar -a -c -f ../../${{ matrix.artifact_name }} *
        else
          tar -cvzf ../../${{ matrix.artifact_name }} .
        fi

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}